services:
  - type: web
    name: velinn-fichas
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: GMAIL_SA_JSON
        sync: false
      - key: DRIVE_SA_JSON
        sync: false
      - key: EMAIL_FROM
        value: no-reply@velinn.com
      - key: EMAIL_SENDER
        sync: false
      - key: HUB_URL
        value: https://velinn-hub.onrender.com
      - key: NOTIF_EMAILS
        sync: false
      - key: FICHAS_NOTIF_SECRET
        sync: false
